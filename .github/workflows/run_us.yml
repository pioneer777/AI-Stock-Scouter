name: 🇺🇸 US 자동 실행

on:
  schedule:
    # ※ GitHub Actions는 UTC 기준
    # 미국 장: 09:30~16:00 EDT(UTC-4) 또는 EST(UTC-5)
    #
    # GitHub Actions 딜레이(30분~2시간)를 흡수하기 위해 목표 수신 시간보다 일찍 발사.
    # EDT/EST 전환(1시간 차이)은 단일 크론으로 통합 — 계절별 1h 드리프트 허용.
    #
    - cron: "30 10 * * 1-5"  # UTC 10:30 → EDT 06:30 / EST 05:30 → 딜레이 후 KST ~20:30 도착 목표 (장전 2H)
    - cron: "30 15 * * 1-5"  # UTC 15:30 → EDT 11:30 / EST 10:30 → 딜레이 후 KST ~01:30 도착 목표 (장 중간)
    - cron: "0 22 * * 1-5"   # UTC 22:00 → EDT 18:00 / EST 17:00 → 장마감 후 기록 (공통)

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-us:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: ▶️ US 장전/장중 — 기록 없음
        if: |
          github.event_name == 'schedule' &&
          (github.event.schedule == '30 10 * * 1-5' ||
           github.event.schedule == '30 15 * * 1-5')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_US }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
        run: python main.py --market US --report FULL

      - name: ▶️ US 장 종료 후 — 기록 O
        if: |
          github.event_name == 'schedule' &&
          github.event.schedule == '0 22 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_US }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          RECORD_SIGNALS:     "true"
        run: python main.py --market US --report FULL

      - name: 🔧 수동 실행 (기록 O)
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_US }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          RECORD_SIGNALS:     "true"
        run: python main.py --market US --report FULL

      - name: 💾 기록 커밋 (장 종료 후 + 수동)
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' &&
           github.event.schedule == '0 22 * * 1-5')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_history_US.json index_US.html charts/US/ || true
          git diff --cached --quiet || git commit -m "chore: US FULL 자동 업데이트 $(date +'%Y-%m-%d %H:%M') UTC"
          git push

      - name: 📤 차트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us-charts-${{ github.run_number }}
          path: |
            charts/US/
            signal_history_US.json
            index_US.html
          retention-days: 3
          if-no-files-found: ignore
