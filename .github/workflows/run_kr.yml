name: 🇰🇷 KR 자동 실행

on:
  schedule:
    # ※ GitHub Actions는 UTC 기준. KST = UTC+9
    # 한국 장: 09:00~15:30 KST
    - cron: "0 22 * * 0-4"   # KST 07:00 장전 2H (일~목 밤 = 월~금 아침)
    - cron: "15 3 * * 1-5"   # KST 12:15 장 중간
    - cron: "30 7 * * 1-5"   # KST 16:30 장 종료 후 1H (기록)

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kr:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: ▶️ KR 장전/장중 (07:00 / 12:15 KST) — 기록 없음
        if: |
          github.event_name == 'schedule' &&
          (github.event.schedule == '0 22 * * 0-4' ||
           github.event.schedule == '15 3 * * 1-5')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_KR }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
        run: python main.py --market KR --report FULL

      - name: ▶️ KR 장 종료 후 (16:30 KST) — 기록 O
        if: |
          github.event_name == 'schedule' &&
          github.event.schedule == '30 7 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_KR }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          RECORD_SIGNALS:     "true"
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
        run: python main.py --market KR --report FULL

      - name: 🔧 수동 실행 (기록 O)
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.CHAT_ID_KR }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
          RECORD_SIGNALS:     "true"
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
        run: python main.py --market KR --report FULL

      - name: 💾 기록 커밋 (장 종료 후 + 수동)
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' &&
           github.event.schedule == '30 7 * * 1-5')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_history_KR.json index_KR.html charts/KR/ || true
          git diff --cached --quiet || git commit -m "chore: KR FULL 자동 업데이트 $(date +'%Y-%m-%d %H:%M') KST"
          git push

      - name: 📤 차트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kr-charts-${{ github.run_number }}
          path: |
            charts/KR/
            signal_history_KR.json
            index_KR.html
          retention-days: 3
          if-no-files-found: ignore
