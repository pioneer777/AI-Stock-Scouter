<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stock Scouter — KR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0E0E0E; color: #E0E0E0;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .card {
      background: #1A1A1A; border: 1px solid #333;
      border-radius: 10px; padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .badge {
      display: inline-block; border-radius: 5px;
      padding: 3px 10px; font-size: 0.8rem;
      font-weight: bold; color: #fff;
      width: fit-content;
    }
    .name { font-size: 1.05rem; font-weight: bold; }
    .code { color: #888; font-size: 0.8rem; }
    .info { font-size: 0.85rem; color: #bbb; }
    .btn {
      margin-top: 8px; padding: 7px 0;
      background: #2196F3; color: #fff;
      border-radius: 6px; text-align: center;
      text-decoration: none; font-size: 0.85rem;
      font-weight: bold;
    }
    .btn:hover { background: #1565C0; }
  </style>
</head>
<body>
  <h1>📊 AI Stock Scouter — KR 시장</h1>
  <p class="sub">마지막 업데이트: 2026-04-27 10:15 | 유효기간 내 시그널 보유 종목</p>
  <div class="grid">

        <div class="card">
          <div class="badge" style="background:#00C851">그랜드 🟢</div>
          <div class="name">실리콘투</div>
          <div class="code">257720</div>
          <div class="info">선정일: 2026-04-27</div>
          <div class="info">진입가: 45,150</div>
          <a class="btn" href="charts/KR/257720_실리콘투.html" target="_blank">📊 차트 보기</a>
        </div>

        <div class="card">
          <div class="badge" style="background:#FFB300">골든 🟡</div>
          <div class="name">삼양식품</div>
          <div class="code">003230</div>
          <div class="info">선정일: 2026-04-27</div>
          <div class="info">진입가: 1,301,000</div>
          <a class="btn" href="charts/KR/003230_삼양식품.html" target="_blank">📊 차트 보기</a>
        </div>
  </div>
</body>
</html>
