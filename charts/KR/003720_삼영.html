    function yBounds(axisId, t0, t1) {
        var lo = Infinity, hi = -Infinity;
        gd.data.forEach(function (tr) {
            if ((tr.yaxis || 'y') !== axisId) return;
            var xs = tr.x;

        var p2 = yBounds('y2', ms0, ms1 + pad);
