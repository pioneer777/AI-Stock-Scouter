"#2196F3","borderpad":4,"borderwidth":1.5,"font":{"color":"#2196F3","size":10},"showarrow":false,"text":"\u003cb\u003eSMA20_6\u002f29\u003c\u002fb\u003e\u003cbr\u003e308,000","x":"2026-06-29","xanchor":"center","xref":"x","xshift":0,"y":0.98,"yanchor":"top","yref":"paper"},{"bgcolor":"#FFFFFF","bordercolor":"#444444","borderpad":4,"borderwidth":1.5,"font":{"color":"#222222","size":10},"showarrow":false,"text":"\u003cb\u003e1\ucc28_4\u002f22\u003c\u002fb\u003e\u003cbr\u003e392,000","x":"2026-04-22","xanchor":"center","xref":"x","xshift":0,"y":0.98,"yanchor":"top","yref":"paper"},{"bgcolor":"#FFFFFF","bordercolor":"#444444","borderpad":4,"borderwidth":1.5,"font":{"color":"#222222","size":10},"showarrow":false,"text":"\u003cb\u003e2\ucc28_4\u002f26\u003c\u002fb\u003e\u003cbr\u003e379,500","x":"2026-04-26","xanchor":"center","xref":"x","xshift":0,"y":0.98,"yanchor":"top","yref":"paper"},{"bgcolor":"#555555","bordercolor":"#555555","borderpad":4,"borderwidth":1,"font":{"color":"#FFFFFF","size":10},"showarrow":false,"text":"\u003cb\u003eRSI 45\u003c\u002fb\u003e","x":0.99,"xanchor":"right","xref":"paper","y":0.20900000000000002,"yanchor":"top","yref":"paper"}],"shapes":[{"line":{"color":"#FFB300","dash":"dash","width":1},"type":"line","x0":"2026-06-09","x1":"2026-06-09","xref":"x","y0":0,"y1":1,"yref":"paper"},{"line":{"color":"#FF3D00","dash":"dash","width":1},"type":"line","x0":"2026-06-10","x1":"2026-06-10","xref":"x","y0":0,"y1":1,"yref":"paper"},{"line":{"color":"#2196F3","dash":"dash","width":1},"type":"line","x0":"2026-06-29","x1":"2026-06-29","xref":"x","y0":0,"y1":1,"yref":"paper"},{"line":{"color":"#AAAAAA","dash":"dash","width":1},"type":"line","x0":"2026-04-22","x1":"2026-04-22","xref":"x","y0":0,"y1":1,"yref":"paper"},{"line":{"color":"#AAAAAA","dash":"dash","width":1},"type":"line","x0":"2026-04-26","x1":"2026-04-26","xref":"x","y0":0,"y1":1,"yref":"paper"}]},                        {"displayModeBar": false, "staticPlot": false, "scrollZoom": false, "responsive": true}                    ).then(function(){
                            
(function () {
    var gd = document.getElementById('chart');
    if (!gd) return;

    /* 모바일 핀치줌 → 브라우저 페이지 확대/축소 (차트가 터치 캡처 안 함) */
    gd.style.touchAction = 'auto';
    setTimeout(function () {
        gd.querySelectorAll('.draglayer,.dragcover,.nsewdrag,.nwdrag,.ewdrag,.sndrag')
          .forEach(function (el) { el.style.touchAction = 'auto'; });
    }, 600);

    /* viewport: user-scalable 허용 */
    (function () {
        var m = document.querySelector('meta[name="viewport"]');
        if (m) { m.content = 'width=device-width,initial-scale=1.0'; }
        else {
            m = document.createElement('meta');
            m.name = 'viewport';
            m.content = 'width=device-width,initial-scale=1.0';
            document.head.appendChild(m);
        }
    }());

    /* ── 날짜 유틸 ───────────────────────────────────────────────── */
    function addDays(d, n)    { var dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
    function subMonths(d, n)  { var dt=new Date(d); dt.setMonth(dt.getMonth()-n); return dt.toISOString().slice(0,10); }
    function subYears(d, n)   { var dt=new Date(d); dt.setFullYear(dt.getFullYear()-n); return dt.toISOString().slice(0,10); }

    /* Plotly.js는 날짜를 내부적으로 ms 타임스탬프(숫자)로 변환해 저장 */
    function toMs(v) {
        return (typeof v === 'number') ? v : new Date(String(v)).getTime();
    }
    function msToIso(ms) {
        return new Date(ms).toISOString().slice(0, 10);
    }
    function getDataEnd() {
        var latest = -Infinity;
        gd.data.forEach(function (tr) {
            if (!tr.x || !tr.x.length) return;
            var ms = toMs(tr.x[tr.x.length - 1]);
            if (!isNaN(ms) && ms > latest) latest = ms;
        });
        return isFinite(latest) ? msToIso(latest) : new Date().toISOString().slice(0, 10);
    }
    function getDataStart() {
        var earliest = Infinity;
        gd.data.forEach(function (tr) {
            if (!tr.x || !tr.x.length) return;
            var ms = toMs(tr.x[0]);
            if (!isNaN(ms) && ms < earliest) earliest = ms;
        });
        return isFinite(earliest) ? msToIso(earliest) : new Date().toISOString().slice(0, 10);
    }

    /* ── 가시 x 구간 내 y 최솟값/최댓값 ────────────────────────── */
    function yBounds(axisId, t0, t1) {
        var lo = Infinity, hi = -Infinity;
        gd.data.forEach(function (tr) {
            if ((tr.yaxis || 'y') !== axisId) return;
            var xs = tr.x; if (!xs || !xs.length) return;
            for (var i = 0; i < xs.length; i++) {
                var t = new Date(xs[i]).getTime();
                if (isNaN(t) || t < t0 || t > t1) continue;
                if (tr.type === 'candlestick') {
                    if (tr.low  && tr.low[i]  != null) lo = Math.min(lo, +tr.low[i]);
                    if (tr.high && tr.high[i] != null) hi = Math.max(hi, +tr.high[i]);
                } else if (tr.y && tr.y[i] != null) {
                    var v = +tr.y[i]; if (!isNaN(v)) { lo=Math.min(lo,v); hi=Math.max(hi,v); }
                }
            }
        });
        return (isFinite(lo) && isFinite(hi)) ? [lo, hi] : null;
    }

    /* ── x + 모든 y 동시 relayout ───────────────────────────────── */
    function applyRange(x0, x1) {
        var ms0 = toMs(x0), ms1 = toMs(x1);
        var upd = {
            'xaxis.autorange': false,
            'xaxis.range': [x0, x1],
        };

        var p1 = yBounds('y', ms0, ms1);
        if (p1) {
            var pad1 = Math.max(p1[1]-p1[0], p1[0]*0.005) * 0.04;
            upd['yaxis.autorange'] = false;
            upd['yaxis.range'] = [p1[0]-pad1, p1[1]+pad1*1.5];
        }
        var p2 = yBounds('y2', ms0, ms1);
        if (p2) {
            upd['yaxis2.autorange'] = false;
            upd['yaxis2.range'] = [0, p2[1]*1.15];
        }
        var p3 = yBounds('y3', ms0, ms1);
        if (p3) {
            var r3 = Math.max(p3[1]-p3[0], Math.abs(p3[0]||0.01)*0.2);
            upd['yaxis3.autorange'] = false;
            upd['yaxis3.range'] = [p3[0]-r3*0.12, p3[1]+r3*0.12];
        }
        try { Plotly.relayout(gd, upd); } catch(e) { console.error('applyRange:', e); }
    }

    /* ── 버튼별 [x0, x1] 계산 ────────────────────────────────────
       우측 여백: 기간의 3% (캘린더 일수 기준)
       idx: 0=1M, 1=3M, 2=1Y, 3=2Y, 4=전체, -1=6M(default) */
    function getRange(idx) {
        var end = getDataEnd();
        var x0, margin;
        if      (idx===0) { x0=subMonths(end,1);  margin=1;  }
        else if (idx===1) { x0=subMonths(end,3);  margin=3;  }
        else if (idx===2) { x0=subYears(end,1);   margin=11; }
        else if (idx===3) { x0=subYears(end,2);   margin=22; }
        else if (idx===4) { x0=getDataStart();     margin=33; }
        else              { x0=subMonths(end,6);  margin=5;  }
        return [x0, addDays(end, margin)];
    }

    /* ── 커스텀 버튼 생성 ────────────────────────────────────────── */
    var _active = -1;
    var _btns   = [];
    var LABELS  = ['1M','3M','1Y','2Y','전체'];

    function styleBtn() {
        _btns.forEach(function (b, j) {
            var on = (j === _active);
            b.style.background = on ? '#222222' : '#F0F0F0';
            b.style.color      = on ? '#FFFFFF'  : '#333333';
            b.style.fontWeight = on ? '600'      : '400';
            b.style.borderColor= on ? '#222222'  : '#CCCCCC';
        });
    }

    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;gap:6px;justify-content:center;padding:10px 0 4px;font-family:Segoe UI,sans-serif;';

    LABELS.forEach(function (label, idx) {
        var btn = document.createElement('button');
        btn.textContent = label;
        btn.style.cssText = 'padding:5px 15px;border:1px solid #CCCCCC;border-radius:4px;cursor:pointer;font-size:13px;';
        btn.addEventListener('click', function () {
            _active = (_active === idx) ? -1 : idx;
            styleBtn();
            var r = getRange(_active);
            applyRange(r[0], r[1]);
        });
        _btns.push(btn);
        bar.appendChild(btn);
    });
    styleBtn();
    gd.parentNode.insertBefore(bar, gd);

    /* ── 모바일 높이 핏 ─────────────────────────────────────────── */
    function fitH() {
        var vv = window.visualViewport;
        var h  = (vv ? vv.height : 0) || window.innerHeight;
        if (h > 100) Plotly.relayout(gd, {height: Math.max(400, Math.floor(h))});
    }
    window.addEventListener('resize', fitH);
    window.addEventListener('orientationchange', function () { setTimeout(fitH, 350); });
    if (window.visualViewport) window.visualViewport.addEventListener('resize', fitH);

    /* ── 초기 6M 뷰 적용 ────────────────────────────────────────── */
    gd.on('plotly_afterplot', function () {
        if (gd._initDone) return;
        gd._initDone = true;
        var r = getRange(-1);
        applyRange(r[0], r[1]);
        setTimeout(fitH, 300);
    });
}());

                        })                };            </script>        </div>
