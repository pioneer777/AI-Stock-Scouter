    function toMs(v) {

    function msToIso(ms) {
        return new Date(ms).toISOString().slice(0, 10);

    function getDataEnd() {
        var latest = -Infinity;

    }

        var end = getDataEnd();

        if      (idx===0) { x0=subMonths(end,1);  margin=1;  }
