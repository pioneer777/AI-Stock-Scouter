    function addDays(d, n)    { var dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }

    function toMs(v) {
        return (typeof v === 'number') ? v : new Date(String(v)).getTime();
    }
    function msToIso(ms) {
        return new Date(ms).toISOString().slice(0, 10);
    }
    function getDataEnd() {
        var latest = -Infinity;
        gd.data.forEach(function (tr) {
            if (!tr.x || !tr.x.length) return;
            var ms = toMs(tr.x[tr.x.length - 1]);
            if (!isNaN(ms) && ms > latest) latest = ms;

        return isFinite(latest) ? msToIso(latest) : new Date().toISOString().slice(0, 10);
    }
    function getDataStart() {
        var earliest = Infinity;
        gd.data.forEach(function (tr) {
            if (!tr.x || !tr.x.length) return;
            var ms = toMs(tr.x[0]);

    function yBounds(axisId, t0, t1) {

        gd.data.forEach(function (tr) {

            var xs = tr.x; if (!xs || !xs.length) return;
            for (var i = 0; i < xs.length; i++) {

                if (isNaN(t) || t < t0 || t > t1) continue;

        }

        var end = getDataEnd();
        var x0, margin;
        if      (idx===0) { x0=subMonths(end,1);  margin=1;  }
