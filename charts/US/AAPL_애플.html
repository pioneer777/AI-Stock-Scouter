    function addDays(d, n)    { var dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
    function subMonths(d, n)  { var dt=new Date(d); dt.setMonth(dt.getMonth()-n); return dt.toISOString().slice(0,10); }

    function toMs(v) {
